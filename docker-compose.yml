version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

  ai-service:
    build:
      context: ./ai-service
    container_name: ai-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    depends_on:
      - redis

  api-server:
    build:
      context: ./url-shortener
    container_name: api-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/urlshortener
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=http://ai-service:8000
      - BASE_URL=http://api-server:5000
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongodb
      - redis
      - ai-service

  analytics-worker:
    build:
      context: ./url-shortener
    container_name: analytics-worker
    command: node src/workers/analyticsWorker.js
    environment:
      - MONGO_URI=mongodb://mongodb:27017/urlshortener
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=http://localhost:5000
    container_name: frontend
    ports:
      - "80:80"
    environment:
      - VITE_BACKEND_URL=http://localhost:5000
    depends_on:
      - api-server

volumes:
  mongo-data:
